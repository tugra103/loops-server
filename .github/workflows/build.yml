name: Build Assets

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Build
        run: |
          npm install
          npm run build
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: loops-build
          path: public/build/
